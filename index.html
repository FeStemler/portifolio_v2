<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.cdnfonts.com/css/pp-neue-montreal" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/space-grotesk" rel="stylesheet">
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              spaceGrotesk: ['Space Grotesk', 'sans-serif'],
              montreal: ['PP Neue Montreal', 'sans-serif'],
            },
            colors: {
              offBlack: '#121212',
              offWhite: '#F5F5F5',
              gray: '#606060',
            },
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        h1, h2, h3, h4, h5, h6 {
          @apply font-montreal;
        }
        p {
          @apply font-spaceGrotesk;
        }
      }
    </style>
    <!-- index.html -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://use.typekit.net/xyz123.css" /> <!-- Replace with Neue Montreal CDN if using Adobe Fonts -->

    <title>Vite + React + TS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
